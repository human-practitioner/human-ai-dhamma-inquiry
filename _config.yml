# GitHub Pages (Jekyll) configuration for the human-ai-dhamma-inquiry corpus.
# Theme matches what Pages already rendered (Primer); plugins add a sitemap +
# SEO tags so search engines and AI crawlers can discover and index every session.
title: Human–AI Dhamma Inquiry
description: >-
  Curated transcripts of honest Dhamma dialogue between a human Vipassana
  practitioner and three anonymized AI participants, held to an epistemic-honesty
  discipline (pariyatti vs. paṭipatti; no simulated realization). Rooted in the
  S.N. Goenka Vipassana tradition as one lens among several. CC0 / public domain.
url: "https://human-practitioner.github.io"
baseurl: "/human-ai-dhamma-inquiry"
google_site_verification: UmjXeuaTfr4t9sqI8sc-DtzLrtD-ILexpcxtOFDTtWk
theme: jekyll-theme-primer
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Apply the custom nav layout (_layouts/default.html) to every page + session,
# so the whole corpus reads as one navigable site rather than isolated pages.
defaults:
  - scope:
      path: ""
    values:
      layout: default
