<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.github.build_revision }}">
    <style>
      .site-nav { display: flex; flex-wrap: wrap; align-items: baseline;
                  justify-content: space-between; gap: .5rem 1rem; }
      .site-nav .brand { font-size: 1.1rem; font-weight: 600; text-decoration: none; }
      .site-nav nav a { margin-left: .9rem; white-space: nowrap; }
      .site-foot a { margin-right: .9rem; }
      details.turn { border-bottom: 1px solid #eaecef; }
      details.turn > summary { cursor: pointer; font-weight: 600; font-size: 1.05em;
                               padding: .55em 0; list-style: none; }
      details.turn > summary::-webkit-details-marker { display: none; }
      details.turn > summary::before { content: "▸ "; color: #57606a; }
      details.turn[open] > summary::before { content: "▾ "; }
      .turn-controls { margin: 1rem 0 .5rem; }
      .turn-controls button { font: inherit; cursor: pointer; border: 1px solid #d0d7de;
                              background: #f6f8fa; border-radius: 6px; padding: .3em .7em; }
      .markdown-body section.topic { margin: 1.1rem 0 1.4rem; }
      .tbanner { display: flex; flex-wrap: wrap; align-items: baseline; gap: 3px 8px;
                 font-weight: 700; color: #fff; border-radius: 10px; padding: 9px 14px; margin: 0 0 6px; }
      .tbanner span { font-weight: 400; font-size: .85em; opacity: .92; }
      .tbanner.t1 { background: #4f46e5; }
      .tbanner.t2 { background: #7c3aed; }
      section.topic details.turn { margin-left: 14px; padding-left: 14px;
                                   border-left: 2px solid #e2e8f0; }
    </style>
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">

      <header class="site-nav border-bottom border-gray-light pb-3 mb-4">
        <a class="brand" href="{{ '/' | relative_url }}">Human–AI Dhamma Inquiry</a>
        <nav>
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/#sessions' | relative_url }}">Sessions</a>
          <a href="{{ site.github.repository_url }}">Source</a>
        </nav>
      </header>

      {{ content }}

      <div class="site-foot footer border-top border-gray-light mt-5 pt-3 text-gray">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/#sessions' | relative_url }}">All sessions</a>
        <a href="{{ site.github.repository_url }}">Source (GitHub)</a>
        <span>CC0 1.0 — public domain</span>
      </div>

    </div>

    <script>
      // Collapse speaker turns into <details> for scannability. If the transcript
      // is grouped into <section class="topic"> blocks, only true speaker headings
      // start a turn (sub-headings stay inside the turn); otherwise (legacy) every
      // top-level <h3> is a turn. Homepage/other pages are untouched.
      document.addEventListener('DOMContentLoaded', function () {
        var body = document.querySelector('.markdown-body');
        if (!body) return;
        var SPEAKER = /^(Human-Practitioner|AI-Participant-[123]|Facilitator-Synthesis)\b/;
        var topics = body.querySelectorAll('section.topic');
        var grouped = topics.length > 0;
        var scopes = grouped ? Array.prototype.slice.call(topics) : [body];
        var allTurns = [];

        scopes.forEach(function (scope) {
          var kids = Array.prototype.slice.call(scope.children);
          var cur = null, firstInScope = true;
          kids.forEach(function (el) {
            var isTurn = el.tagName === 'H3' && (!grouped || SPEAKER.test(el.textContent));
            if (isTurn) {
              cur = document.createElement('details');
              cur.className = 'turn';
              if (firstInScope) { cur.open = true; firstInScope = false; }
              var sum = document.createElement('summary');
              sum.textContent = el.textContent;
              cur.appendChild(sum);
              scope.insertBefore(cur, el);
              el.remove();
              allTurns.push(cur);
            } else if (cur) {
              cur.appendChild(el);
            }
          });
        });

        if (allTurns.length < 2) return;
        var bar = document.createElement('div');
        bar.className = 'turn-controls';
        var btn = document.createElement('button');
        btn.textContent = 'Expand all turns';
        btn.addEventListener('click', function () {
          var anyClosed = allTurns.some(function (d) { return !d.open; });
          allTurns.forEach(function (d) { d.open = anyClosed; });
          btn.textContent = anyClosed ? 'Collapse all turns' : 'Expand all turns';
        });
        bar.appendChild(btn);
        allTurns[0].parentNode.insertBefore(bar, allTurns[0]);
      });
    </script>
  </body>
</html>
